<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="page2.css">
</head>
<body>
    <header>
        <img src="kv-logo.png" class="kv-header-image" alt="Logo">
    </header>
    <div class="container">
        <aside class="left-container">
            <img src="employee-list.png" class="employee-left-container-image" alt="Logo">
        </aside>
        <div class="right-container">
            <div class="form-heading-container">
                <h1>Create Employee</h1>
            </div>

            <div class="form-container">

                <div class="form-field">
                    <label>Employee Name</label>
                    <input type="text" placeholder="Employee Name" >
                </div>
                <div class="form-field">
                    <label>Employee ID</label>
                    <input type="text" placeholder="Employee ID" >
                </div>
                <div class="form-field">
                    <label>Joining Date</label>
                    <input type="text" placeholder="Joining Date" >
                </div>
                <div class="form-field">
                    <label>Role</label>
                    <input type="text" placeholder="Choose Role" >
                </div>
                <div class="form-field">
                    <label>Status</label>
                    <input type="text" placeholder="Status" >
                </div>
                <div class="form-field">
                    <label>Experience</label>
                    <input type="text" placeholder="Experience" >
                </div>
                <div class="address-form-field">
                    <div class="address-field">
                        <label>Address</label>
                        <input type="text" placeholder="Address" >
                    </div>
                    <div class="location-address-field">
                        <input type="text" placeholder="City" >
                        <input type="text" placeholder="Country" >
                    </div>
                    <div class="postalcode-address-field">
                        <input type="text" class="postalcode-files" placeholder="Postal Code" >
                    </div>
                    <div class="button-field">
                    <button class="submit-button">Create</button>
                    <button class="cancel-button">Cancel</button>
                </div>
                
                </div>
                <div class="id-proof-field">
                    <label>Upload ID Proof</label>  
                    <input type="text" class="id-proof-files" placeholder=" 📎 Upload ID Proof" >
                </div>    
            </div>  
                    


                
                
            
        </div>
    </div>
                





</body>
</html>
